version: '3.8'

services:
  energymon:
    build: .
    container_name: hybrid-energy-profiler
    ports:
      - "${ENERGYMON_PORT:-5000}:5000"
    volumes:
      # Persist data across container restarts
      - ./data:/app/data
      - ./logs:/app/logs
      - ./output:/app/output
      - ./config.json:/app/config.json
    environment:
      - ENERGYMON_PORT=5000
      - ENERGYMON_LOG_LEVEL=${ENERGYMON_LOG_LEVEL:-INFO}
      - ENERGYMON_DEBUG=${ENERGYMON_DEBUG:-false}
      - ENERGYMON_STORAGE_ENABLED=${ENERGYMON_STORAGE_ENABLED:-true}
    restart: unless-stopped
    # Resource limits (optional)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    # Health check
    healthcheck:
      test: ["CMD", "python", "-c", "import requests; requests.get('http://localhost:5000/health', timeout=2)"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
